# Nexora — Nginx reverse proxy config
# Used when deploying WITHOUT Cloudflare Tunnel (direct port forwarding setup).
# If using Cloudflare Tunnel, you don't need Nginx.
#
# Replace YOUR_API_DOMAIN and YOUR_N8N_DOMAIN with your actual subdomains.
# After Certbot runs, it will modify this file to add SSL automatically.
#
# To use: copy nginx/ folder to the server, install Nginx, then:
#   sudo cp nginx/nginx.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl reload nginx

events {
    worker_connections 1024;
}

http {

    # --- Backend API ---
    server {
        listen 80;
        server_name YOUR_API_DOMAIN;   # e.g. api.nexora.io

        # Required for Certbot domain verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Larger body for file uploads / webhook payloads
            client_max_body_size 10M;
        }
    }

    # --- n8n Automation ---
    server {
        listen 80;
        server_name YOUR_N8N_DOMAIN;   # e.g. n8n.nexora.io

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass         http://127.0.0.1:5678;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (required by n8n)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }

}
